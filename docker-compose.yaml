# nginx proxy address - http://172.17.0.1:3009

name: pairdrop
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  pairdrop:
    image: lscr.io/linuxserver/pairdrop:latest
    pull_policy: always
    container_name: pairdrop-app
    restart: always
    logging: *default-logging
    networks:
      - pairdrop
      - proxy
      - cloudflare
    ports:
      - "172.17.0.1:3009:3000"
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${SERVICE_USER:-1000}
      PGID: ${SERVICE_GROUP:-1000}
      RATE_LIMIT: "false"
      WS_FALLBACK: "false"
      RTC_CONFIG: ""
      CONTAINER_NAME: pairdrop-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    volumes:
      - ./volumes/config/pairdrop:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://pairdrop-app:3000'
      - 'cloudflare.hostname=pairdrop.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.pairdrop-app.entrypoints=http'
      - 'traefik.http.routers.pairdrop-app-secure.tls=true'
      - 'traefik.http.routers.pairdrop-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.pairdrop-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.pairdrop-app.middlewares=pairdrop-app-https-redirect'
      - 'traefik.http.routers.pairdrop-app-secure.entrypoints=https'
      - 'traefik.http.routers.pairdrop-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.pairdrop-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.pairdrop-app-secure.service=pairdrop-app'
      - 'traefik.http.services.pairdrop-app.loadbalancer.server.port=3000'

networks:
  pairdrop:
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
