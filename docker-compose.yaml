# nginx proxy address - http://172.17.0.1:3009

name: pairdrop
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  pairdrop:
    image: lscr.io/linuxserver/pairdrop:latest
    pull_policy: always
    container_name: pairdrop-app
    restart: always
    logging: *default-logging
    networks:
      - pairdrop
    ports:
      - "172.17.0.1:3009:3000"
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${SERVICE_USER:-1000}
      PGID: ${SERVICE_GROUP:-1000}
      RATE_LIMIT: "false"
      WS_FALLBACK: "false"
      RTC_CONFIG: ""
    volumes:
      - ./volumes/config/pairdrop:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  pairdrop:
    external: false
